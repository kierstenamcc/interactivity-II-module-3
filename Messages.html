<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="stylemessages.css">
    <script src="script.messages.js"></script>
    <title>Main Page</title>
</head>
<body>
    <h1>Welcome to Messages</h1>
    
    <!-- Back to main page -->
    <p>Go to the <a href="index.html">Main Page</a>.</p>

<!-- Message chat box -->
<div class="chat-popup" id="myForm">

  <div class="chat-window">

    <!-- HEADER -->
    <div class="chat-header">
      <span>💬 MSN Messenger</span>
      <button type="button" onclick="closeChat()">✖</button>
    </div>

    <!-- CHAT AREA -->
    <div id="chatMessages" class="chat-messages"></div>

    <!-- INPUT AREA -->
    <div class="chat-input">

      <input id="messageInput" type="text" placeholder="Type a message...">

      <button type="button" onclick="sendMessage()">Send</button>

    </div>

  </div>

</div>
<br><br>

<img src="sparkle.gif" class="chat-gif" alt="gif" width="400">

</body>
</html>
