<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylesheetWIP0.css">
</head>

<body>

<div class="desktop">

  <div class="items"></div>

  <h1>WELCOME</h1>

  <!-- ICONS -->
  <div class="icon" style="top: 40px; left: 40px;">🗂 My Files</div>
  <div class="icon" style="top: 140px; left: 40px;">💿 Music</div>

  <!-- WINDOWS LAYER (IMPORTANT) -->
  <div class="windows-layer"></div>

</div>

<!-- TASKBAR -->
<div class="taskbar">
  <div class="start-button">Start</div>
</div>

<!-- TEMPLATE WINDOW (ONLY ONE) -->
<div class="xp-window" id="xpBox" style="display:none;">
  <div class="xp-title-bar">
    <span>My Computer</span>
    <div class="xp-buttons">
      <button>_</button>
      <button>□</button>
      <button class="close">X</button>
    </div>
  </div>

  <div class="xp-content">
    <p>⚠️ Warning!</p>
    <p>You cannot go back.</p>
    <button class="xp-ok">OK</button>
  </div>
</div>

<script src="script.WIP0.js"></script>

</body>
</html>
